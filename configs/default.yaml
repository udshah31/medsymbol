# MedSymbol Default Configuration
# ================================

project:
  name: "medsymbol"
  version: "0.1.0"
  seed: 42

# ── Data Paths ──────────────────────────────────────
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  ontology_dir: "data/ontology"

  # Dataset selection: "nih_cxr14" | "mimic_cxr" | "chexpert"
  dataset: "nih_cxr14"

  # Image preprocessing
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]  # ImageNet stats
  normalize_std: [0.229, 0.224, 0.225]

  # Data splits
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

# ── Model Architecture ──────────────────────────────
model:
  # Module 1: Multimodal Neural Encoder
  vision_encoder:
    name: "google/vit-base-patch16-224"
    output_dim: 768
    freeze_layers: 8  # freeze first 8 transformer blocks
  
  text_encoder:
    name: "dmis-lab/biobert-v1.1"
    output_dim: 768
    max_length: 512
  
  tabular_encoder:
    input_dim: 50     # number of lab features
    output_dim: 256
    n_steps: 3        # TabNet parameter
  
  history_encoder:
    input_dim: 20     # number of demographic features
    hidden_dim: 256
    output_dim: 128
  
  # Fusion
  fusion:
    input_dim: 1920   # 768 + 768 + 256 + 128
    hidden_dim: 1024
    output_dim: 512   # Patient representation dimension
    dropout: 0.3

  # Module 2: Concept Extraction
  concept_extraction:
    n_concepts: 500   # top SNOMED codes
    hidden_dim: 1024
    dropout: 0.3
    threshold: 0.5    # concept activation threshold

  # Module 3: Diagnosis Prediction
  diagnosis:
    n_diagnoses: 14   # CheXpert/MIMIC labels
    hidden_dim: 256

  # Module 4: Entropy-Gated Controller
  entropy_controller:
    tau_low: 0.3      # fast path threshold
    tau_high: 1.5     # defer path threshold

# ── Training ────────────────────────────────────────
training:
  batch_size: 32
  num_epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5
  
  # Early stopping
  patience: 10
  min_delta: 0.001

  # Device
  device: "mps"       # Apple Silicon GPU; change to "cuda" for NVIDIA
  num_workers: 4
  pin_memory: true

# ── Evaluation Targets ──────────────────────────────
evaluation:
  auc_roc_target: 0.90
  sensitivity_target: 0.85
  specificity_target: 0.85
  ontology_consistency_target: 0.99
  mean_latency_target_ms: 500
  p95_latency_target_ms: 1000
  proof_validity_target: 1.0

# ── Experiment Tracking ─────────────────────────────
wandb:
  project: "medsymbol"
  entity: null  # set to your W&B username
  enabled: false  # enable when ready
